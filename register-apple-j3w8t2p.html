<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-title" content="商品登録">
    <title>商品登録</title>
    
    <link rel="icon" href="make2.png" type="image/png">
    <link rel="apple-touch-icon" href="make2.png">
    
    <link rel="stylesheet" href="https://static.line-scdn.net/lineseed-jp/edge/fonts.css">
    <style>
        :root { 
            --primary: #1c1c1e; 
            --accent: #007AFF; 
            --bg: #f5f5f7; 
            --font-main: 'LINE Seed JP', -apple-system, BlinkMacSystemFont, sans-serif;
            --border-color: #e2e2e9; 
            --error: #ff3b30; 
            --btn-gray: #f2f2f7;
        }
        body { 
            font-family: var(--font-main); 
            background: var(--bg); 
            padding: 10px; 
            color: #1c1c1e; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased; 
            -webkit-text-size-adjust: 100%; 
            text-size-adjust: 100%;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 24px 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
        }
        h1 { font-size: 1.1rem; text-align: center; margin-bottom: 12px; font-weight: 700; }
        
        .btn-reset { 
            background: var(--error); color: white; width: 100%; padding: 14px; 
            border: none; border-radius: 14px; font-size: 0.9rem; font-weight: 700; 
            cursor: pointer; margin-bottom: 24px; transition: transform 0.1s;
        }
        .btn-reset:active { transform: scale(0.98); opacity: 0.9; }

        .section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #eff0f6; }
        .hidden { display: none !important; }
        label { display: block; font-weight: 700; margin-bottom: 12px; font-size: 0.9rem; color: #4a4a4e; }
        
        select, input { 
            font-family: var(--font-main); width: 100%; padding: 14px; border: 1.5px solid var(--border-color); 
            border-radius: 12px; font-size: 1rem; box-sizing: border-box; margin-bottom: 12px; background: #fff; 
            -webkit-appearance: none; appearance: none;
        }
        select:disabled { background-color: #f2f2f7; color: #8e8e93; opacity: 1; -webkit-text-fill-color: #8e8e93; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .checkbox-item { 
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 12px 6px; min-height: 64px; background: var(--btn-gray); 
            border: 1.5px solid var(--border-color); border-radius: 12px; cursor: pointer;
        }
        .checkbox-item input { display: none; }
        .checkbox-item:has(input:checked) { border-color: var(--accent); background: #e5f1ff; }
        .checkbox-item:has(input:checked) .checkbox-label { color: var(--accent); font-weight: 700; }
        .checkbox-label { font-size: 0.75rem; font-weight: 500; color: #1c1c1e; pointer-events: none; line-height: 1.4; }
        
        .sub-panel { background: #f4f4f9; padding: 16px; border-radius: 12px; margin-top: 12px; border: 1px solid #e2e2e9; }
        
        button.btn-copy { 
            font-family: var(--font-main); width: 100%; padding: 18px; border: none; border-radius: 14px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s; margin-bottom: 12px;
        }
        .btn-copy-title { background: #e2e2e9; color: #1c1c1e; }
        .btn-copy-body { background: var(--primary); color: white; margin-top: 10px; }
        
        .output-wrapper { 
            margin-top: 30px; border-top: 2px solid var(--bg); padding-top: 20px;
            display: flex; flex-direction: column; align-items: center; 
        }
        .output-box { 
            padding: 18px; background: #fff; color: #1c1c1e; font-family: var(--font-main); 
            font-size: 0.85rem; white-space: pre-wrap; border-radius: 16px; 
            border: 1.5px solid var(--border-color); margin-bottom: 8px; word-break: break-all; width: 100%; box-sizing: border-box;
        }
        #output-body { 
            font-size: 13px; width: 325px; box-sizing: content-box; 
            max-width: calc(100% - 32px); padding: 16px; margin-bottom: 8px; 
            display: block; margin-left: auto; margin-right: auto;
        }
        
        .output-label { font-size: 0.8rem; font-weight: 700; color: #8e8e93; margin-bottom: 6px; align-self: flex-start; }
        .char-count { width: 100%; text-align: right; font-size: 0.75rem; color: #8e8e93; font-weight: 500; margin-bottom: 12px; }
        .count-over { color: var(--error); font-weight: 700; }
        .required { color: var(--error); margin-left: 4px; }
        
        #toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 24px;
            border-radius: 25px; font-size: 0.9rem; font-weight: 700;
            z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>商品登録</h1>
    <button class="btn-reset" onclick="resetAll()">すべてをリセット</button>

    <div class="section">
        <label>商品名 <span class="required">*</span></label>
        <select id="productId" onchange="resetAndFillUI(); autoGenerate();"></select>
    </div>

    <div class="section">
        <div id="wrapperCharging" class="hidden">
            <label>充電方式 <span class="required">*</span></label>
            <select id="chargingMethod" onchange="autoGenerate()"></select>
        </div>
        <div id="wrapperSpec" class="hidden">
            <label id="labelSpec">スペック <span class="required">*</span></label>
            <select id="spec" onchange="updateUI(); autoGenerate();"></select>
        </div>
        <div id="wrapperSize" class="hidden">
            <label>サイズ <span class="required">*</span></label>
            <select id="size" onchange="autoGenerate()"></select>
        </div>
        <div id="wrapperRam" class="hidden">
            <label>RAM <span class="required">*</span></label>
            <select id="ram" onchange="autoGenerate()"></select>
        </div>
        <div id="wrapperSsd" class="hidden">
            <label>SSD <span class="required">*</span></label>
            <select id="ssd" onchange="autoGenerate()"></select>
        </div>
        <div id="wrapperColor" class="hidden">
            <label>カラー <span class="required">*</span></label>
            <select id="color" onchange="updateUI(); autoGenerate();"></select>
        </div>
    </div>

    <div class="section">
        <label>同梱物 <span class="required">*</span></label>
        <div id="accessoriesGroup" class="checkbox-group"></div>
        
        <div id="bandDetails" class="sub-panel hidden">
            <label>バンドサイズ <span class="required">*</span></label>
            <select id="bandSize" onchange="autoGenerate()">
                <option value="">選択してください</option>
                <option value="S／M">S／M</option>
                <option value="M／L">M／L</option>
            </select>
            
            <label>バンドカラー</label>
            <input type="text" id="bandColor" oninput="autoGenerate()" placeholder="例：ミッドナイト">
            
            <label>バンド状態 <span class="required">*</span></label>
            <select id="bandCondition" onchange="autoGenerate()">
                <option value="">選択してください</option>
                <option value="使用感がほとんどない未使用に近いものです。">未使用に近い</option>
                <option value="裏面にスレがありますが黄ばみやベタつき、致命傷はありません。">微スレあり・致命傷なし</option>
                <option value="使用感はありますが、問題なく着用可能です。">使用感あり・着用可能</option>
            </select>
        </div>
    </div>

    <div class="section">
        <label>外観状態 <span class="required">*</span></label>
        <select id="condition" onchange="updateUI(); autoGenerate();">
            <option value="">選択してください</option>
            <option value="未開封の「新品／未使用」状態">新品</option>
            <option value="使用感が少ない「未使用に近い」状態">未使用に近い</option>
            <option value="目立つ傷、スレがない「とても良好」な状態">とても良好</option>
            <option value="小傷、微スレありますが「致命傷のない」状態">致命傷なし</option>
            <option value="傷、スレありますが「十分に使用可能」な状態">使用可能</option>
        </select>
        
        <div id="appearancePanel">
            <div id="boxA">
                <label id="labelA">詳細A <span class="required">*</span></label>
                <select id="detailA" onchange="autoGenerate()"></select>
            </div>
            <div id="boxB">
                <label id="labelB">詳細B <span class="required">*</span></label>
                <select id="detailB" onchange="autoGenerate()"></select>
            </div>
            <div id="boxC">
                <label id="labelC">詳細C <span class="required">*</span></label>
                <select id="detailC" onchange="autoGenerate()"></select>
            </div>
        </div>
        
        <label style="margin-top:10px;">外観備考</label>
        <input type="text" id="appearanceNotes" oninput="autoGenerate()" placeholder="例：液晶保護フィルム貼付済み">
    </div>

    <div class="section">
        <div id="wrapperBattery">
            <label id="batteryLabel">バッテリー最大容量 (%) <span class="required">*</span></label>
            <input type="number" id="battery" oninput="autoGenerate()" placeholder="0-100">
        </div>
        
        <div id="wrapperBatteryType" class="hidden">
            <label>バッテリー交換履歴 <span class="required">*</span></label>
            <select id="batteryType" onchange="autoGenerate()">
                <option value="">選択してください</option>
                <option value="※Apple純正バッテリー">Apple純正バッテリー</option>
                <option value="※総務省登録修理店にて交換済みの他社バッテリー">登録修理店での交換（他社製）</option>
            </select>
        </div>
        
        <div id="wrapperIMEI" class="hidden">
            <label>IMEI <span class="required">*</span></label>
            <input type="text" id="imei" oninput="autoGenerate()" placeholder="IMEI番号を入力">
        </div>
        
        <div id="wrapperNet" class="hidden">
            <label id="labelNet">ネットワーク利用制限 <span class="required">*</span></label>
            <select id="netRestriction" onchange="autoGenerate()">
                <option value="">選択してください</option>
                <option value="-">-</option>
                <option value="○">○</option>
            </select>
        </div>
        
        <label>保証</label>
        <select id="warranty" onchange="autoGenerate()">
            <option value="">選択なし</option>
            <option value="Apple Care Service">Apple Care Service</option>
            <option value="AppleCare+">AppleCare+</option>
            <option value="Apple製品限定保証">Apple製品限定保証</option>
        </select>
    </div>
    
    <div class="section">
        <label>配送ランク <span class="required">*</span></label>
        <select id="shippingRank" onchange="autoGenerate()"></select>
    </div>

    <div id="output-wrapper" class="output-wrapper hidden">
        <span class="output-label">タイトル</span>
        <div id="output-title" class="output-box"></div>
        <button class="btn-copy btn-copy-title" onclick="processCopy('title')">タイトルをコピー</button>
        <div id="title-char-count" class="char-count">タイトル: 0/65</div>
        
        <span class="output-label">本文</span>
        <div id="output-body" class="output-box"></div>
        <div id="body-char-count" class="char-count">本文: 0/1000</div>
        <button class="btn-copy btn-copy-body" onclick="processCopy('body')">本文をコピー</button>
    </div>
</div>

<div id="toast"></div>

                "天板、側面、背面は薄いスレや小傷（1mm以下）があり、ややゴム足の劣化がありますが、使用に影響が出る程の劣化はなく、問題なく使用可能です。"
            ]
        }
    }
};

function init() {
    const pSel = document.getElementById('productId'); 
    pSel.innerHTML = '<option value="">選択してください</option>';
    
    Object.entries(PRODUCTS).forEach(([id, p]) => {
        pSel.innerHTML += `<option value="${id}">${p.name}</option>`;
    });
    
    const accGroup = document.getElementById('accessoriesGroup'); 
    accGroup.innerHTML = '';
    
    MASTER.accs.forEach(a => {
        let displayLabel = a;
        if (a === "シリコンバンド（未使用／互換品）") {
            displayLabel = "シリコンバンド（互換品）";
        } else if (a === "充電ケーブル（未使用／互換品／テスト用）") {
            displayLabel = "充電ケーブル（互換品）";
        }
        
        displayLabel = displayLabel.replace('（', '<br>（').replace('／', '／<br>').replace('と', 'と<br>');
        
        const label = document.createElement('label'); 
        label.className = 'checkbox-item';
        label.innerHTML = `<input type="checkbox" value="${a}" onchange="updateUI(); autoGenerate();"><span class="checkbox-label">${displayLabel}</span>`;
        accGroup.appendChild(label);
    });
    
    const sRank = document.getElementById('shippingRank'); 
    sRank.innerHTML = '<option value="">選択してください</option>';
    Object.entries(MASTER.shipping).forEach(([id, r]) => {
        sRank.innerHTML += `<option value="${id}">${r.label}</option>`;
    });
}

function resetAndFillUI() {
    ['chargingMethod', 'spec', 'size', 'color', 'detailA', 'detailB', 'detailC', 'ram', 'ssd'].forEach(id => {
        document.getElementById(id).innerHTML = '<option value="">選択してください</option>';
    });
    updateUI();
}

function resetAll() {
    document.getElementById('productId').value = ""; 
    resetAndFillUI();
    
    document.querySelectorAll('#accessoriesGroup input').forEach(cb => { 
        cb.checked = false; 
        cb.disabled = false; 
    });
    
    ['appearanceNotes', 'battery', 'bandColor', 'imei'].forEach(id => {
        document.getElementById(id).value = "";
    });
    
    ['condition', 'warranty', 'shippingRank', 'bandSize', 'bandCondition', 'netRestriction', 'batteryType'].forEach(id => { 
        document.getElementById(id).value = ""; 
    });
    
    document.getElementById('shippingRank').disabled = false;
    
    updateUI(); 
    autoGenerate(); 
    showToast("リセットしました");
}

function updateUI() {
    const pid = document.getElementById('productId').value; 
    if(!pid) return;
    
    const cat = PRODUCTS[pid].cat; 
    const specVal = document.getElementById('spec').value;
    const isCellular = (specVal === "GPS Cellular");
    
    const toggle = (id, show) => {
        document.getElementById(id).classList.toggle('hidden', !show);
    };
    
    toggle('wrapperCharging', MASTER.charging[pid] && cat !== "macbook"); 
    toggle('wrapperSpec', MASTER.specs[pid] && cat !== "macbook"); 
    toggle('wrapperSize', MASTER.sizes[pid] && cat !== "macbook"); 
    toggle('wrapperRam', cat === "macbook");
    toggle('wrapperSsd', cat === "macbook");
    toggle('wrapperColor', MASTER.colors[pid]); 
    toggle('wrapperBattery', pid !== "11");
    
    toggle('wrapperNet', cat === "iphone" || (cat === "watch" && isCellular));
    toggle('wrapperBatteryType', cat === "iphone"); 
    toggle('wrapperIMEI', cat === "iphone");
    
    // 赤い必須マークのスタイルを完全に維持しつつラベル切り替え
    if (cat === "iphone") {
        document.getElementById('labelSpec').innerHTML = '容量 <span class="required">*</span>';
    } else {
        document.getElementById('labelSpec').innerHTML = 'スペック <span class="required">*</span>';
    }

    if (cat === "macbook") {
        document.getElementById('labelA').innerHTML = '詳細A（画面） <span class="required">*</span>';
        document.getElementById('labelB').innerHTML = '詳細B（キーボード／トラックパッド） <span class="required">*</span>';
        document.getElementById('labelC').innerHTML = '詳細C（天板／側面／背面） <span class="required">*</span>';
    } else {
        document.getElementById('labelA').innerHTML = '詳細A <span class="required">*</span>';
        document.getElementById('labelB').innerHTML = '詳細B <span class="required">*</span>';
        document.getElementById('labelC').innerHTML = '詳細C <span class="required">*</span>';
    }
    
    fillSelectOnce('chargingMethod', MASTER.charging[pid]); 
    fillSelectOnce('spec', MASTER.specs[pid]); 
    fillSelectOnce('size', MASTER.sizes[pid]); 
    fillSelectOnce('ram', MASTER.rams[pid]);
    fillSelectOnce('ssd', MASTER.ssds[pid]);
    fillSelectOnce('color', MASTER.colors[pid]);
    
    if (["5", "6", "7", "8", "12"].includes(pid)) {
        document.getElementById('batteryLabel').innerHTML = '10分間の消費バッテリー（%） <span class="required">*</span>';
    } else {
        document.getElementById('batteryLabel').innerHTML = 'バッテリー最大容量（%） <span class="required">*</span>';
    }
    
    const condSelect = document.getElementById('condition'); 
    const accCheckboxes = document.querySelectorAll('#accessoriesGroup input');
    const sRank = document.getElementById('shippingRank');
    
    if (cat === "macbook") {
        sRank.value = "C";
        sRank.disabled = true;
    } else {
        sRank.disabled = false;
    }

    if (cat === "pencil") {
        condSelect.value = "未開封の「新品／未使用」状態"; 
        condSelect.disabled = true;
        accCheckboxes.forEach(cb => { 
            cb.checked = (cb.value === "新品同梱品と同じ"); 
            cb.disabled = true; 
        });
        toggle('appearancePanel', false);
    } else {
        condSelect.disabled = false; 
        accCheckboxes.forEach(cb => {
            cb.disabled = false;
        });
        
        toggle('appearancePanel', condSelect.value !== "未開封の「新品／未使用」状態");
        
        if(condSelect.value !== "未開封の「新品／未使用」状態") {
            let groupKey = cat;
            if (["5", "6", "7", "8"].includes(pid)) groupKey = "audio";
            
            const group = MASTER.details[groupKey]; 
            if(group) { 
                fillDetail('A', group.A); 
                fillDetail('B', group.B); 
                fillDetail('C', group.C); 
            }
        }
    }
    
    const hasSportsBand = Array.from(document.querySelectorAll('#accessoriesGroup input:checked')).some(i => i.value === "スポーツバンド（アップル純正）");
    toggle('bandDetails', hasSportsBand);
}

function fillSelectOnce(id, arr) {
    const el = document.getElementById(id); 
    if(!arr || el.options.length > 1) return;
    arr.forEach(v => {
        el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

function fillDetail(suffix, arr) {
    const el = document.getElementById('detail' + suffix); 
    if(!arr || el.options.length > 1) return;
    el.innerHTML = '<option value="">-- 選択してください --</option>'; 
    arr.forEach(v => {
        el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

function getKeywords(pid, spec, charging, color) {
    const p = PRODUCTS[pid]; 
    if (!p) return ""; 
    
    const cat = p.cat;
    if (pid === "13") {
        return `Apple iPhone13 mini ${spec} SIMフリー ${color} iPhone13mini`;
    }
    
    const name = p.name; 
    const c2 = spec || charging; 
    const e2 = color;
    
    if (name === "Apple AirPods Pro 第2世代" && c2 === "Lightning") return "MQD83J/A エアポッツプロ AirPodsPro2";
    if (name === "Apple AirPods Pro 第2世代" && c2 === "USB-C") return "MTJV3J/A エアポッツプロ AirPodsPro2";
    if (name === "Apple AirPods 4 ANC") return "MXP93J/A エアポッツ AirPods4 エアポッズ";
    if (cat === "watch") return "アップルウォッチ applewatch";
    if (name === "Apple Pencil 第1世代") return "MK0C2JA MYQW3JA アップルペンシル";
    if (name === "Apple Pencil 第2世代") return "MU8F2JA MXN43JA アップルペンシル";
    if (name === "Apple HomePod mini") return "ホームポッドミニ HomePodmini";
    if (pid === "12") return `${color} マジックトラックパッド`;
    
    return "";
}

function validateInputs() {
    const pid = document.getElementById('productId').value; 
    if(!pid) return false;
    
    const cat = PRODUCTS[pid].cat; 
    const specVal = document.getElementById('spec').value;
    const isCellular = (specVal === "GPS Cellular");
    
    if(!document.getElementById('wrapperCharging').classList.contains('hidden') && !document.getElementById('chargingMethod').value) return false;
    if(!document.getElementById('wrapperSpec').classList.contains('hidden') && !document.getElementById('spec').value) return false;
    if(!document.getElementById('wrapperSize').classList.contains('hidden') && !document.getElementById('size').value) return false;
    if(!document.getElementById('wrapperRam').classList.contains('hidden') && !document.getElementById('ram').value) return false;
    if(!document.getElementById('wrapperSsd').classList.contains('hidden') && !document.getElementById('ssd').value) return false;
    if(!document.getElementById('wrapperColor').classList.contains('hidden') && !document.getElementById('color').value) return false;
    
    const checkedAccs = Array.from(document.querySelectorAll('#accessoriesGroup input:checked'));
    if(checkedAccs.length === 0) return false;
    
    if(cat === "iphone") { 
        if(!document.getElementById('batteryType').value || !document.getElementById('netRestriction').value || !document.getElementById('imei').value) {
            return false; 
        }
    }
    
    if(cat === "watch" && isCellular && !document.getElementById('netRestriction').value) return false;
    
    if(!document.getElementById('bandDetails').classList.contains('hidden')) { 
        if(!document.getElementById('bandSize').value || !document.getElementById('bandCondition').value) return false; 
    }
    
    const cond = document.getElementById('condition').value; 
    if(!cond) return false;
    
    if(cond !== "未開封の「新品／未使用」状態") { 
        if(!document.getElementById('detailA').value || !document.getElementById('detailB').value || !document.getElementById('detailC').value) {
            return false; 
        }
    }
    
    if(!document.getElementById('wrapperBattery').classList.contains('hidden') && !document.getElementById('battery').value) return false;
    if(!document.getElementById('shippingRank').value) return false;
    
    return true;
}

function showToast(message) {
    const toast = document.getElementById('toast'); 
    toast.innerText = message; 
    toast.classList.add('show');
    setTimeout(() => { 
        toast.classList.remove('show'); 
    }, 1000);
}

function autoGenerate() {
    if(!validateInputs()) { 
        document.getElementById('output-wrapper').classList.add('hidden'); 
        return; 
    }
    
    const pid = document.getElementById('productId').value; 
    const cond = document.getElementById('condition').value; 
    const ship = document.getElementById('shippingRank').value; 
    const p = PRODUCTS[pid]; 
    const cat = p.cat;
    const spec = document.getElementById('spec').value; 
    const charging = document.getElementById('chargingMethod').value;
    const size = document.getElementById('size').value;
    const ramVal = document.getElementById('ram').value;
    const ssdVal = document.getElementById('ssd').value;
    const color = document.getElementById('color').value;
    
    const kw = getKeywords(pid, spec, charging, color); 
    const checkedAccs = Array.from(document.querySelectorAll('#accessoriesGroup input:checked')).map(i => i.value); 
    const isNewBundle = checkedAccs.includes("新品同梱品と同じ"); 
    const isNewCond = (cond === "未開封の「新品／未使用」状態");
    
    let titleLine = "";
    let bodyTitleLine = "";
    
    if (cat === "iphone") {
        titleLine = kw;
        bodyTitleLine = titleLine;
    } else if (cat === "macbook") {
        let modelNum = "";
        if (color === "シルバー") modelNum = "MGN93J/A";
        else if (color === "スペースグレイ") modelNum = "MGN63J/A";
        else if (color === "ゴールド") modelNum = "MGND3J/A";
        
        titleLine = `Apple M1 MacBook Air Retina 13.3 ${modelNum} ${color} ${ramVal} ${ssdVal}`;
        bodyTitleLine = `Apple M1 MacBookAir 13インチ ${modelNum} ${color} ${ramVal} ${ssdVal} マックブック Mac`;
    } else {
        titleLine = `${p.name} ${charging} ${spec} ${size} ${color} ${kw}`.replace(/\s+/g, ' ').trim();
        bodyTitleLine = titleLine;
    }
    
    let bodyText = bodyTitleLine + "\n\n━━━━━━━━━━━━━━━━━━━━\n商品説明\n━━━━━━━━━━━━━━━━━━━━\n";
    
    if (cat === "macbook") {
        bodyText += `13.3インチ、RetinaディスプレイのM1モデル。\nメモリは${ramVal}で、ストレージは${ssdVal}です。\n\n`;
    }
    
    bodyText += "【同梱物】\n";
    
    if (!isNewBundle) {
        bodyText += "・本体\n";
    }
    
    checkedAccs.forEach(a => {
        bodyText += `・${a}\n`;
    }); 
    
    if(!isNewBundle) {
        bodyText += "\n※未記載の物（外箱・説明書等）は発送できません。\n";
    }
    
    bodyText += `\n【外観状態】\n■${cond}\n`;
    
    if(!isNewCond) { 
        bodyText += `${document.getElementById('detailA').value}\n${document.getElementById('detailB').value}\n${document.getElementById('detailC').value}\n`;
        
        const notes = document.getElementById('appearanceNotes').value; 
        if(notes) {
            bodyText += `${notes}\n`;
        }
        
        if (checkedAccs.includes("スポーツバンド（アップル純正）")) { 
            const bSize = document.getElementById('bandSize').value; 
            const bColor = document.getElementById('bandColor').value; 
            const bCond = document.getElementById('bandCondition').value; 
            
            if (bSize && bCond) {
                let colorText = bColor ? `「${bColor}」` : "";
                bodyText += `スポーツバンド「${bSize}」サイズの${colorText}は、${bCond}\n`; 
            }
        } 
        
        bodyText += "\n※簡易清掃を行なった上で、撮影を行なっています。\n　画像に写らない微細な傷等がある場合がありますので、ご了承ください。\n\n■動作不良・機能不具合等は、ありません。\n"; 
    }
    
    const bVal = document.getElementById('battery').value;
    if(pid !== "11" && bVal) {
        if(["5", "6", "7", "8"].includes(pid)) {
            bodyText += `・バッテリーは、10分の音楽再生で約${bVal}％消費\n※製品仕様上、バッテリー最大容量は数値化できません。\n`;
        } else if(pid === "12") {
            bodyText += `・バッテリーは、10分の接続で約${bVal}％消費\n※製品仕様上、バッテリー最大容量は数値化できません。\n`;
        } else {
            bodyText += `・バッテリー最大容量は「${bVal}%」です。\n`;
        }
    }
    
    if(cat === "iphone") { 
        bodyText += document.getElementById('batteryType').value + "\n"; 
    }
    
    let initMsg = "";
    if (cat === "iphone") {
        // 【v17.14追加】iPhoneカテゴリのみ、初期化メッセージの前に空行（\n）を入れる例外処理
        initMsg = "\n・本体の初期化、アクティベーションロック解除済み\n";
    } else if (cat === "watch") {
        initMsg = "・本体の初期化、アクティベーションロック解除済み\n";
    } else if (cat === "macbook") {
        initMsg = "・初期化、アクティベーションロック／アカウント連携解除済み\n";
    } else if (["5", "6", "7", "8"].includes(pid)) {
        initMsg = "・本体の初期化、アカウント連携解除済み（探す機能、使用可能）\n";
    } else {
        initMsg = "・本体のリセット済み\n";
    }
    
    if (!isNewBundle) {
        bodyText += initMsg;
    }

    const net = document.getElementById('netRestriction').value;
    if (net) {
        bodyText += `\n■ネットワーク利用制限「${net}」\n`;
        if (cat === "iphone") {
            const imei = document.getElementById('imei').value;
            bodyText += `（IMEI：${imei}）\n`;
            if (net === "○") {
                bodyText += "・国内キャリア版で残債、利用制限はありません。\n";
            } else {
                bodyText += "・Apple直販国内モデルで利用制限はありません。\n";
            }
            bodyText += "（SIMロック解除済みなので、お好きなキャリアで利用可能です）\n";
        } else {
            if (net === "○") {
                bodyText += "・国内キャリア版で残債、利用制限はありません。\n";
            } else {
                bodyText += "・Apple直販国内モデルで利用制限はありません。\n";
            }
        }
    }
    
    const warranty = document.getElementById('warranty').value; 
    if(warranty) { 
        bodyText += `\n■${warranty}\n`; 
        if (warranty === "Apple Care Service") {
            bodyText += "（AppleCare+の通信キャリア版で保証内容は同等です）\n";
        } else if (warranty === "AppleCare+") {
            bodyText += "（故障・盗難・紛失時に割安でサポート対応）\n";
        } else {
            bodyText += "（自然故障であれば無償で修理が可能です）\n";
        }
    }

    bodyText += "\n━━━━━━━━━━━━━━━━━━━━\n発送／補償\n━━━━━━━━━━━━━━━━━━━━\n・15時までの支払い完了で【当日発送】します。\n\n■お支払い方法\n・PayPay\n・クレジットカード\n※クレジットカードの承認は、4時間程度かかります。\n　承認が15:00以降の場合は、翌日発送となります。\n\n";
    bodyText += MASTER.shipping[ship].text + "\n\n";
    
    if(checkedAccs.includes("充電ケーブル（未使用／互換品／テスト用）")) {
        bodyText += "※充電ケーブル（テスト用）は、受取時の動作確認用です。耐久性や品質は保証致しかねます。\n\n";
    }
    
    const commonFooter = "━━━━━━━━━━━━━━━━━━━━\n出品直後でも価格交渉歓迎！\n━━━━━━━━━━━━━━━━━━━━\n無視、ブロックはしませんので何度でもご相談ください。";
    
    if(isNewCond) {
        bodyText += `${commonFooter}\n\n※新品・未開封品ですが、万が一初期不良があった場合はご連絡ください。`; 
    } else {
        bodyText += `${commonFooter}\n\n※商品説明にない動作不良や機能不具合があった場合は、返品／返金します。`;
    }
    
    if (warranty) {
        bodyText += "\n\n※Appleの保証内容は出品時点の情報です。適用条件や契約状況を確約するものではありません。";
    }

    document.getElementById('output-wrapper').classList.remove('hidden');
    document.getElementById('output-title').innerText = titleLine; 
    document.getElementById('output-body').innerText = bodyText;
    
    const updateCount = (id, current, max, label) => {
        const el = document.getElementById(id); 
        let countHtml = "";
        if (current > max) {
            countHtml = `<span class="count-over">${current}</span>`;
        } else {
            countHtml = `<span>${current}</span>`;
        }
        el.innerHTML = `${label}: ${countHtml}/${max}`;
    };
    
    updateCount('title-char-count', titleLine.length, 65, 'タイトル'); 
    updateCount('body-char-count', bodyText.length, 1000, '本文');
}

function processCopy(type) {
    const title = document.getElementById('output-title').innerText;
    const body = document.getElementById('output-body').innerText;
    if (type === 'title') {
        navigator.clipboard.writeText(title).then(() => showToast("タイトルをコピーしました"));
    } else {
        navigator.clipboard.writeText(body).then(() => showToast("本文をコピーしました"));
    }
}

init();
