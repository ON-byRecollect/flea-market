<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="apple-mobile-web-app-title" content="商品登録">
    <title>商品登録</title>
    
    <link rel="icon" href="make2.png" type="image/png">
    <link rel="apple-touch-icon" href="make2.png">
    
    <link rel="stylesheet" href="https://static.line-scdn.net/lineseed-jp/edge/fonts.css">
    <style>
        :root { 
            --primary: #1c1c1e; 
            --accent: #007AFF; 
            --bg: #f5f5f7; 
            --font-main: 'LINE Seed JP', -apple-system, BlinkMacSystemFont, sans-serif;
            --border-color: #e2e2e9;
            --error: #ff3b30;
            --btn-gray: #f2f2f7;
        }
        body { 
            font-family: var(--font-main);
            background: var(--bg); padding: 10px; color: #1c1c1e; line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        .container { 
            max-width: 600px; margin: 0 auto; background: white; padding: 24px 20px; 
            border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); 
        }
        h1 { font-size: 1.1rem; text-align: center; margin-bottom: 12px; font-weight: 700; }
        
        .btn-reset { 
            background: var(--error); color: white; width: 100%; padding: 14px; 
            border: none; border-radius: 14px; font-size: 0.9rem; font-weight: 700; 
            cursor: pointer; margin-bottom: 24px; transition: transform 0.1s;
        }
        .btn-reset:active { transform: scale(0.98); opacity: 0.9; }

        .section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #eff0f6; }
        .hidden { display: none !important; }
        label { display: block; font-weight: 700; margin-bottom: 12px; font-size: 0.9rem; color: #4a4a4e; }
        
        select, input { 
            font-family: var(--font-main); width: 100%; padding: 14px; border: 1.5px solid var(--border-color); 
            border-radius: 12px; font-size: 1rem; box-sizing: border-box; margin-bottom: 12px; background: #fff; 
            -webkit-appearance: none; appearance: none;
        }
        select:disabled { background-color: #f2f2f7; color: #8e8e93; opacity: 1; -webkit-text-fill-color: #8e8e93; }
        
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .checkbox-item { 
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 12px 6px; min-height: 64px;
            background: var(--btn-gray); border: 1.5px solid var(--border-color); border-radius: 12px;
            transition: all 0.2s ease; cursor: pointer;
        }
        .checkbox-item input { display: none; }
        .checkbox-item:has(input:checked) { border-color: var(--accent); background: #e5f1ff; }
        .checkbox-item:has(input:checked) .checkbox-label { color: var(--accent); font-weight: 700; }
        .checkbox-label { font-size: 0.75rem; font-weight: 500; color: #1c1c1e; pointer-events: none; line-height: 1.4; }
        .checkbox-item:has(input:disabled) { background: #e2e2e9; opacity: 0.5; cursor: default; }

        .sub-panel { background: #f4f4f9; padding: 16px; border-radius: 12px; margin-top: 12px; border: 1px solid #e2e2e9; }
        
        button.btn-copy { 
            font-family: var(--font-main); width: 100%; padding: 18px; border: none; border-radius: 14px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s;
            margin-bottom: 12px;
        }
        .btn-copy-title { background: #e2e2e9; color: #1c1c1e; }
        .btn-copy-body { background: var(--primary); color: white; margin-top: 10px; }

        .output-wrapper { 
            margin-top: 30px; border-top: 2px solid var(--bg); padding-top: 20px;
            display: flex; flex-direction: column; align-items: center; 
        }
        .output-box { 
            padding: 18px; background: #fff; color: #1c1c1e; font-family: var(--font-main); 
            font-size: 0.85rem; white-space: pre-wrap; border-radius: 16px; 
            border: 1.5px solid var(--border-color); margin-bottom: 8px;
            word-break: break-all; width: 100%; box-sizing: border-box;
        }
        #output-body { 
            font-size: 13px; width: 325px; box-sizing: content-box; 
            max-width: calc(100% - 32px); padding: 16px; margin-bottom: 8px; 
            display: block; margin-left: auto; margin-right: auto;
        }

        .output-label { font-size: 0.8rem; font-weight: 700; color: #8e8e93; margin-bottom: 6px; align-self: flex-start; }
        .char-count { width: 100%; text-align: right; font-size: 0.75rem; color: #8e8e93; font-weight: 500; margin-bottom: 12px; }
        .count-over { color: var(--error); font-weight: 700; }
        .required { color: var(--error); margin-left: 4px; }

        #toast {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: white; padding: 12px 24px;
            border-radius: 25px; font-size: 0.9rem; font-weight: 700;
            z-index: 9999; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>商品登録</h1>
    <button class="btn-reset" onclick="resetAll()">すべてをリセット</button>

    <div class="section">
        <label>商品名 <span class="required">*</span></label>
        <select id="productId" onchange="resetAndFillUI(); autoGenerate();"></select>
    </div>

    <div class="section">
        <div id="wrapperCharging" class="hidden"><label>充電方式 <span class="required">*</span></label><select id="chargingMethod" onchange="autoGenerate()"></select></div>
        <div id="wrapperSpec" class="hidden"><label>スペック <span class="required">*</span></label><select id="spec" onchange="autoGenerate()"></select></div>
        <div id="wrapperSize" class="hidden"><label>サイズ <span class="required">*</span></label><select id="size" onchange="autoGenerate()"></select></div>
        <div id="wrapperColor" class="hidden"><label>カラー <span class="required">*</span></label><select id="color" onchange="updateUI(); autoGenerate();"></select></div>
    </div>

    <div class="section">
        <label>同梱物 <span class="required">*</span></label>
        <div id="accessoriesGroup" class="checkbox-group"></div>
        <div id="bandDetails" class="sub-panel hidden">
            <label>バンドサイズ <span class="required">*</span></label>
            <select id="bandSize" onchange="autoGenerate()"><option value="">選択してください</option><option value="S／M">S／M</option><option value="M／L">M／L</option></select>
            <label>バンドカラー</label><input type="text" id="bandColor" oninput="autoGenerate()" placeholder="例：ミッドナイト">
            <label>バンド状態 <span class="required">*</span></label>
            <select id="bandCondition" onchange="autoGenerate()"><option value="">選択してください</option><option value="使用感がほとんどない未使用に近いものです。">未使用に近い</option><option value="裏面にスレがありますが黄ばみやベタつき、致命傷はありません。">微スレあり・致命傷なし</option><option value="使用感はありますが、問題なく着用可能です。">使用感あり・着用可能</option></select>
        </div>
    </div>

    <div class="section">
        <label>外観状態 <span class="required">*</span></label>
        <select id="condition" onchange="updateUI(); autoGenerate();"><option value="">選択してください</option><option value="未開封の「新品／未使用」状態">新品</option><option value="使用感が少ない「未使用に近い」状態">未使用に近い</option><option value="目立つ傷、スレがない「とても良好」な状態">とても良好</option><option value="小傷、微スレありますが「致命傷のない」状態">致命傷なし</option><option value="傷、スレありますが「十分に使用可能」な状態">使用可能</option></select>
        <div id="appearancePanel"><div id="boxA"><label id="labelA">詳細A <span class="required">*</span></label><select id="detailA" onchange="autoGenerate()"></select></div><div id="boxB"><label id="labelB">詳細B <span class="required">*</span></label><select id="detailB" onchange="autoGenerate()"></select></div><div id="boxC"><label id="labelC">詳細C <span class="required">*</span></label><select id="detailC" onchange="autoGenerate()"></select></div></div>
        <label style="margin-top:10px;">外観備考</label><input type="text" id="appearanceNotes" oninput="autoGenerate()" placeholder="例：液晶保護フィルム貼付済み">
    </div>

    <div class="section">
        <div id="wrapperBattery"><label id="batteryLabel">バッテリー最大容量 (%) <span class="required">*</span></label><input type="number" id="battery" oninput="autoGenerate()" placeholder="0-100"></div>
        <label>保証</label><select id="warranty" onchange="autoGenerate()"><option value="">選択なし</option><option value="Apple Care Service">Apple Care Service</option><option value="AppleCare+">AppleCare+</option><option value="Apple製品限定保証">Apple製品限定保証</option></select>
        <div id="wrapperNet" class="hidden"><label>ネットワーク利用制限 <span class="required">*</span></label><select id="netRestriction" onchange="autoGenerate()"><option value="">選択してください</option><option value="-">-</option><option value="○">○</option></select></div>
    </div>
    <div class="section"><label>配送ランク <span class="required">*</span></label><select id="shippingRank" onchange="autoGenerate()"></select></div>

    <div id="output-wrapper" class="output-wrapper hidden">
        <span class="output-label">タイトル</span>
        <div id="output-title" class="output-box"></div>
        <button class="btn-copy btn-copy-title" onclick="processCopy('title')">タイトルをコピー</button>
        <div id="title-char-count" class="char-count">タイトル: 0/65</div>
        <span class="output-label">本文</span>
        <div id="output-body" class="output-box"></div>
        <div id="body-char-count" class="char-count">本文: 0/1000</div>
        <button class="btn-copy btn-copy-body" onclick="processCopy('body')">本文をコピー</button>
    </div>
</div>

<div id="toast"></div>
